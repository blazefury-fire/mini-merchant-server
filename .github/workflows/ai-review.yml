name: AI Code Review

on:
  pull_request:
    branches: [ master ]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  deepseek-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.java' | head -c 15000)
          # Save diff to a file to avoid issues with special characters
          echo "$DIFF" > diff.txt

      - name: Call DeepSeek API
        id: review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat diff.txt | jq -Rs .)

          RESPONSE=$(curl -s https://api.deepseek.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -d @- <<EOF
          {
            "model": "deepseek-chat",
            "messages": [
              {
                "role": "system",
                "content": "You are a senior Java/Spring Boot engineer. Review the following code diff. Point out logic errors, potential bugs, best-practice violations, and security issues. Keep the response concise, use markdown, and group findings by severity. If the code looks fine, state clearly what is good about it."
              },
              {
                "role": "user",
                "content": $DIFF_CONTENT
              }
            ],
            "temperature": 0.3
          }
          EOF
          )

          COMMENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
          echo "$COMMENT" > review_comment.txt

      - name: Post comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('review_comment.txt', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 DeepSeek Code Review\n\n${comment}`
            });