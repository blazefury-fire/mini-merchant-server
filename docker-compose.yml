services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_DB: mini_merchant_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: abc123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - merchant-network

  redis:
    image: redis:7
    container_name: redis_db
    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    networks:
      - merchant-network

volumes:
  postgres_data:
  redis_data:

networks:
  merchant-network:
    driver: bridge
