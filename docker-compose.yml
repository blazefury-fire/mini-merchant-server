services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_DB: mini_merchant_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: abc123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mini_merchant_db"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - merchant-network

  redis:
    image: redis:7
    container_name: redis_db
    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - merchant-network

  adminer:
    image: adminer:latest
    container_name: mini_merchant_adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - merchant-network

  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    networks:
      - merchant-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    restart: always
    ports:
      - "8082:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - merchant-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini_merchant_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      # --- Datasource (PostgreSQL) — host is the compose service name, not localhost ---
      DB_URL: jdbc:postgresql://postgres:5432/mini_merchant_db
      DB_USERNAME: admin
      DB_PASSWORD: abc123
      DB_DRIVER_CLASS_NAME: org.postgresql.Driver

      # --- JPA / Flyway ---
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"

      # --- Redis ---
      REDIS_HOST: redis
      REDIS_PORT: "6379"

      # --- Kafka (in-network PLAINTEXT listener) ---
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_PAYMENT_COMPLETED: payment-completed

      # --- JWT (demo defaults — change for production) ---
      JWT_SECRET: change-me-please-use-a-long-random-secret-of-at-least-32-bytes
      JWT_ACCESS_TOKEN_TTL_MINUTES: "600000000"
      JWT_REFRESH_TOKEN_TTL_DAYS: "7"

      # --- Rate limiting ---
      RATELIMIT_PAYMENTS_LIMIT: "10"
      RATELIMIT_PAYMENTS_WINDOW_SECONDS: "60"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - merchant-network

volumes:
  postgres_data:
  redis_data:

networks:
  merchant-network:
    driver: bridge
